<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth | JS-Project</title>

    <!-- Icons CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- DaisyUl CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <!-- Header Section -->
    <header>
        <!-- Navber Section -->
         <nav class="bg-[#15803D]">
            <div class="w-11/12 mx-auto  flex justify-between items-center min-h-16 max-h-16">
                <div class="text-white">
                    <h4 class="text-[17px]">Green Earth</h4>
                </div>

                <div class="text-white flex gap-5 ">
                    <a class="text-sm hover:underline" href="#">About</a>
                    <a class="text-sm hover:underline" href="#">Gallery</a>
                    <a class="text-sm hover:underline" href="#">Plant a Tree</a>
                </div>

                <div>
                    <button class="btn rounded-full bg-[#FACC15] text-[#15803D] font-semibold border-none h-9">Plant a Tree</button>
                </div>
            </div>
         </nav>

        <!-- Hero-Section -->
        <section>
                <div class=" bg-[#cff0dc] min-h-70 max-h-70 mx-auto flex justify-center items-center relative">
                    <!-- bg images -->
                    <div class="bg-[url('./assets/hero-leaf1.png')] h-100 w-90 bg-contain bg-no-repeat absolute top-[27px] left-0"></div>
                    <div class="bg-[url('./assets/hero-leaf2.png')] h-100 w-90 bg-contain bg-no-repeat absolute top-[27px] right-0"></div>
                    
                    <div class="text-center space-y-4 ">
                        <h1 class="text-4xl font-bold">Plant a Tree, Grow a Future</h1>
                        <p class="text-[12px] w-[90%] mx-auto">Join our mission to plant 1 million trees and make the Earth greener for future generations.</p>
                        <div>
                            <button class="btn rounded-full bg-[#FACC15] text-[#15803D] font-semibold border-none h-9">Get Involved</button>
                        </div>
                    </div>
                </div>
        </section>
    </header>

    <script src="./script.js"></script>
</body>
</html>
